name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.repository_owner == 'WildwoodWorks'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run test

      # Detect whether an npm publish credential is configured. `secrets` can't be used directly
      # in an `if:` expression, so surface it as a step output. Without the token, publishing would
      # fail with ENEEDAUTH — so we skip the publish step instead of failing every merge to main.
      - name: Detect npm publish token
        id: npm_auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN secret is not set — skipping the changesets publish step. Add an npm Automation token as the NPM_TOKEN repo secret to enable releases."
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        if: steps.npm_auth.outputs.present == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
